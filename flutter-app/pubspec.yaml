name: docs2mcp_frontend
description: A Flutter app for managing Docs2MCP server

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  provider: ^6.1.1
  url_launcher: ^6.2.2
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  # Enable web support
  assets:
    - assets/
  # Add platform support
  platforms:
    android:
      defaultConfig:
        minSdkVersion: 21
    ios:
      deploymentTarget: '11.0'
    web:
      pluginClass: Docs2MCPPlugin
      fileName: docs2mcp_web.dart
